<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сакральный Южный Казахстан</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #8b5e3c;
            --gold: #d4af37;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4e9d5; 
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { color: var(--accent); text-align: center; margin-bottom: 20px; }

        /* АДАПТИВНАЯ КАРТА */
        .map-container {
            position: relative;
            width: 95vw;
            max-width: 1000px;
            aspect-ratio: 1000 / 550;
            background-image: url('map.jpg'); /* ТВОЙ ФАЙЛ */
            background-size: cover;
            background-position: center;
            border: 6px solid var(--accent);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* НЕВИДИМЫЕ КНОПКИ */
        .pin {
            position: absolute;
            width: 60px; 
            height: 60px; 
            background-color: transparent; 
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%); 
            z-index: 10;
            transition: 0.3s;
        }
        .pin:hover { background-color: rgba(212, 175, 55, 0.2); }

        /* МОДАЛЬНОЕ ОКНО (Оверлей) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        /* КОНТЕНТ ОКНА */
        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            max-height: 600px;
            border-radius: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        /* Слайды */
        .slides-container {
            flex: 1;
            position: relative;
            display: flex;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .slide.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .slide img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .slide h2 { color: var(--accent); margin: 10px 0; font-size: 24px; }
        .slide p { color: #555; line-height: 1.6; font-size: 16px; overflow-y: auto; }

        /* СТРЕЛКИ */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1100;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .nav-btn:hover { background: var(--gold); }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            color: var(--accent);
            cursor: pointer;
            z-index: 1200;
        }

        .page-indicator {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #999;
            font-weight: bold;
        }

        /* Мобильные правки */
        @media (max-width: 600px) {
            .slide { padding: 30px 15px; }
            .nav-btn { width: 40px; height: 40px; }
            .modal-content { height: 90vh; }
        }
    </style>
</head>
<body>

    <h1>Сакральные места Южного Казахстана</h1>

    <div class="map-container">
        <div class="pin" style="top: 52%; left: 32%;" onclick="openModal('sayram')"></div>
        <div class="pin" style="top: 42%; left: 38%;" onclick="openModal('arystan')"></div>
        <div class="pin" style="top: 48%; left: 49%;" onclick="openModal('turkestan')"></div>
        <div class="pin" style="top: 73%; left: 42%;" onclick="openModal('sauran')"></div>
        <div class="pin" style="top: 68%; left: 63%;" onclick="openModal('appak')"></div>
        <div class="pin" style="top: 42%; left: 70%;" onclick="openModal('kazygurt')"></div>
        <div class="pin" style="top: 48%; left: 75%;" onclick="openModal('akmechet')"></div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <button class="nav-btn prev-btn" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="nav-btn next-btn" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>

            <div id="slides-container" class="slides-container">
                </div>

            <div id="page-indicator" class="page-indicator">1 / 3</div>
        </div>
    </div>

    <script>
    const locations = {
        sayram: {
            slides: [
                {
                    title: "Древний Сайрам (Испиджаб)",
                    img: "sayram_main.jpg",
                    desc: "Сайрам — один из древнейших городов Казахстана, возраст которого превышает 3000 лет. В эпоху Средневековья он был важнейшим экономическим и культурным узлом на Великом Шёлковом пути, заслужив почетное название «Колыбель святых»."
                },
                {
                    title: "Мавзолей Ибрагим-ата",
                    img: "ibrahim_ata.jpg",
                    desc: "Этот архитектурный памятник XII-XIV веков возведен над могилой отца великого суфия Ходжи Ахмеда Яссави. Мавзолей является местом массового паломничества, привлекая верующих своей строгой кирпичной кладкой и мощной духовной энергетикой древности."
                },
                {
                    title: "Мавзолей Карашаш-ана",
                    img: "karashash_ana.jpg",
                    desc: "Святыня посвящена матери Ходжи Ахмеда Яссави, которая была символом мудрости и женского благородства. Нынешнее здание построено в XIX веке на месте более древнего сооружения и восхищает изяществом форм и мастерством средневекового зодчества."
                }
            ]
        },
        arystan: {
            slides: [
                {
                    title: "Мавзолей Арыстан-Баб",
                    img: "arystan_main.jpg",
                    desc: "Мавзолей воздвигнут над могилой учителя Ахмеда Яссави. Согласно легенде, Арыстан-Баб был сподвижником пророка Мухаммеда и передал Ахмеду священные четки. Это важнейшая святыня, которую паломники традиционно посещают перед поездкой в Туркестан."
                },
                {
                    title: "Древний Отрар",
                    img: "otrar.jpg",
                    desc: "Рядом с мавзолеем находятся руины легендарного Отрара — города, который героически сопротивлялся войскам Чингисхана. Здесь родился великий философ Аль-Фараби, и именно здесь находилась одна из крупнейших библиотек древнего мира."
                }
            ]
        },
        turkestan: {
            slides: [
                {
                    title: "Туркестан — Духовная Столица",
                    img: "turk_main.jpg",
                    desc: "Город с полуторатысячелетней историей, долгое время служивший столицей Казахского ханства. Туркестан признан духовным центром тюркского мира, объединяющим культурное наследие кочевников и великие достижения исламской архитектуры Средней Азии."
                },
                {
                    title: "Мавзолей Ходжи Ахмеда Яссави",
                    img: "yassawi.jpg",
                    desc: "Грандиозное сооружение XIV века, построенное по приказу Эмира Тимура. Его огромный лазурный купол — самый большой в Центральной Азии. Мавзолей является шедевром мирового значения и включен в список Всемирного наследия ЮНЕСКО."
                },
                {
                    title: "Мавзолей Рабии Султан Бегим",
                    img: "rabia.jpg",
                    desc: "Усыпальница дочери знаменитого ученого и правителя Улугбека. Памятник XV века расположен на территории комплекса Азрет-Султан. Его архитектура с восьмигранным основанием подчеркивает высокий статус и благородство похороненной здесь принцессы."
                }
            ]
        },
        sauran: {
            slides: [
                {
                    title: "Городище Сауран",
                    img: "sauran_main.jpg",
                    desc: "Уникальный памятник средневековой городской культуры. Сауран был неприступной крепостью с мощными стенами и рвами. Город прославился своей уникальной системой водоснабжения — кяризами, сложными подземными каналами, которые функционировали сотни лет."
                }
            ]
        },
        appak: {
            slides: [
                {
                    title: "Мечеть-медресе Аппак Ишан",
                    img: "appak_main.jpg",
                    desc: "Архитектурный памятник XIX века в поселке Шаян. Уникальность сооружения заключается в том, что оно построено без использования гвоздей. Внутри сохранились учебные комнаты и молельный зал, передающие атмосферу духовного образования прошлого века."
                }
            ]
        },
        akmechet: {
            slides: [
                {
                    title: "Пещера Акмечеть",
                    img: "akmechet_main.jpg",
                    desc: "Это грандиозный природный объект, скрытый в недрах земли. Пещера имеет собственный микроклимат: здесь всегда прохладно и растут деревья, которых нет на поверхности. Легенды связывают это место с защитой воинов во время джунгарского нашествия."
                }
            ]
        },
        kazygurt: {
            slides: [
                {
                    title: "Священная гора Казыгурт",
                    img: "kazygurt_main.jpg",
                    desc: "Гора, овеянная множеством мифов и легенд. Жители Южного Казахстана верят, что во время Всемирного потопа ковчег пророка Нуха (Ноя) причалил именно к этой вершине, сделав её символом спасения человечества и начала новой жизни."
                },
                {
                    title: "Кеме Калган (Корабль)",
                    img: "ship.jpg",
                    desc: "На перевале горы установлена символическая инсталляция в виде летящего корабля-ковчега. Ночью сооружение подсвечивается, создавая мистический образ парящего над степью судна, напоминая путникам о древних преданиях этих святых земель."
                }
            ]
        }
    };

    let currentLoc = "";
    let currentSlide = 0;

    function openModal(id) {
        currentLoc = id;
        currentSlide = 0;
        const locData = locations[id];
        
        if (!locData) {
            alert("Данные для этой точки ещё пополняются!");
            return;
        }

        renderSlides();
        document.getElementById('overlay').style.display = 'flex';
        updateButtons();
    }

    function renderSlides() {
        const container = document.getElementById('slides-container');
        const data = locations[currentLoc];
        
        container.innerHTML = data.slides.map((s, index) => `
            <div class="slide ${index === 0 ? 'active' : ''}">
                <img src="${s.img}" onerror="this.src='https://via.placeholder.com/600x300?text=Загрузите+фото:+${s.img}'">
                <h2>${s.title}</h2>
                <p>${s.desc}</p>
            </div>
        `).join('');
        
        updateIndicator();
    }

    function changeSlide(direction) {
        const slides = document.querySelectorAll('.slide');
        if (slides.length === 0) return;
        
        slides[currentSlide].classList.remove('active');
        currentSlide += direction;
        slides[currentSlide].classList.add('active');
        
        updateButtons();
        updateIndicator();
    }

    function updateButtons() {
        const data = locations[currentLoc];
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        
        // Скрываем стрелки, если слайд всего один
        if (data.slides.length <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        } else {
            prevBtn.style.display = 'flex';
            nextBtn.style.display = 'flex';
            prevBtn.disabled = (currentSlide === 0);
            nextBtn.disabled = (currentSlide === data.slides.length - 1);
        }
    }

    function updateIndicator() {
        const data = locations[currentLoc];
        const indicator = document.getElementById('page-indicator');
        if (data.slides.length <= 1) {
            indicator.style.display = 'none';
        } else {
            indicator.style.display = 'block';
            indicator.innerText = `${currentSlide + 1} / ${data.slides.length}`;
        }
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
    }

    window.onkeydown = (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "ArrowRight" && !document.querySelector('.next-btn').disabled) changeSlide(1);
        if (e.key === "ArrowLeft" && !document.querySelector('.prev-btn').disabled) changeSlide(-1);
    };
</script>
</body>
</html>
</html>
